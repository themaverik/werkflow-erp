name: Unit Tests

on:
  pull_request:
    branches:
      - main
      - develop
  push:
    branches:
      - main
      - develop

jobs:
  test:
    runs-on: ubuntu-latest
    strategy:
      matrix:
        java-version: ['21']

    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Set up JDK ${{ matrix.java-version }}
        uses: actions/setup-java@v4
        with:
          java-version: ${{ matrix.java-version }}
          distribution: 'temurin'
          cache: maven

      - name: Run unit tests
        working-directory: services/business
        run: |
          mvn clean test
          TEST_EXIT_CODE=$?
          if [ $TEST_EXIT_CODE -eq 0 ]; then
            echo "✅ All tests passed"
          else
            echo "❌ Tests failed"
            exit $TEST_EXIT_CODE
          fi

      - name: Publish test results
        uses: EnricoMi/publish-unit-test-result-action@v2
        if: always()
        with:
          files: 'services/business/target/surefire-reports/TEST-*.xml'
          check_name: 'Unit Test Results'
          comment_title: 'Test Report'
          comment_on_pr: true

      - name: Upload test reports
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: test-reports
          path: services/business/target/surefire-reports/
          retention-days: 30

      - name: Comment test summary on PR
        if: always() && github.event_name == 'pull_request'
        uses: actions/github-script@v7
        with:
          script: |
            const fs = require('fs');
            const path = require('path');
            
            // Read test summary
            const reportDir = 'services/business/target/surefire-reports';
            let testCount = 0;
            let failureCount = 0;
            
            try {
              const files = fs.readdirSync(reportDir);
              const xmlFiles = files.filter(f => f.startsWith('TEST-') && f.endsWith('.xml'));
              
              xmlFiles.forEach(file => {
                const content = fs.readFileSync(path.join(reportDir, file), 'utf8');
                const testsMatch = content.match(/tests="(\d+)"/);
                const failuresMatch = content.match(/failures="(\d+)"/);
                
                if (testsMatch) testCount += parseInt(testsMatch[1]);
                if (failuresMatch) failureCount += parseInt(failuresMatch[1]);
              });
            } catch (e) {
              console.log('Could not read test reports');
            }
            
            const status = failureCount === 0 ? '✅ PASSED' : '❌ FAILED';
            const body = `## Test Results\n\n${status}\n\n- **Tests**: ${testCount}\n- **Failures**: ${failureCount}`;
            
            github.rest.issues.createComment({
              issue_number: context.issue.number,
              owner: context.repo.owner,
              repo: context.repo.repo,
              body: body
            });
