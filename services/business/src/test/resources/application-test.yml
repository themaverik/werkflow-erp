spring:
  datasource:
    url: jdbc:h2:mem:testdb;MODE=PostgreSQL;INIT=CREATE SCHEMA IF NOT EXISTS hr_service\;CREATE SCHEMA IF NOT EXISTS finance_service\;CREATE SCHEMA IF NOT EXISTS procurement_service\;CREATE SCHEMA IF NOT EXISTS inventory_service
    driverClassName: org.h2.Driver
    username: sa
    password:
    initialization-mode: always
    continue-on-error: true
  sql:
    init:
      data-locations: classpath:h2-sequences.sql
      mode: always
  jpa:
    database-platform: org.hibernate.dialect.H2Dialect
    hibernate:
      ddl-auto: create-drop
    show-sql: false
    properties:
      hibernate.jdbc.time_zone: UTC
  flyway:
    enabled: false
    placeholderReplacement: false
  cache:
    type: caffeine
    caffeine:
      spec: maximumSize=1000,expireAfterWrite=10m
