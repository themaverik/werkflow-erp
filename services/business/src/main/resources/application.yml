spring:
  application:
    name: werkflow-business-service

  datasource:
    url: jdbc:postgresql://${POSTGRES_HOST:localhost}:${POSTGRES_PORT:5433}/${POSTGRES_DB:werkflow}
    username: ${POSTGRES_USER:werkflow_admin}
    password: ${POSTGRES_PASSWORD:secure_password_change_me}
    driver-class-name: org.postgresql.Driver
    hikari:
      maximum-pool-size: 20
      minimum-idle: 5
      connection-timeout: 30000
      idle-timeout: 600000
      max-lifetime: 1800000

  jpa:
    database-platform: org.hibernate.dialect.PostgreSQLDialect
    hibernate:
      ddl-auto: validate
    show-sql: ${JPA_SHOW_SQL:false}
    properties:
      hibernate:
        format_sql: true
        jdbc:
          time_zone: UTC

  flyway:
    enabled: true
    baseline-on-migrate: true
    locations: classpath:db/migration
    schemas: ${SPRING_DATASOURCE_SCHEMA:business_service}

  security:
    oauth2:
      resourceserver:
        jwt:
          issuer-uri: ${KEYCLOAK_URL:http://localhost:8090}/realms/${KEYCLOAK_REALM:werkflow}
          jwk-set-uri: ${KEYCLOAK_JWK_SET_URI:http://localhost:8090/realms/${KEYCLOAK_REALM:werkflow}/protocol/openid-connect/certs}

  jackson:
    serialization:
      write-dates-as-timestamps: false
    time-zone: UTC
    default-property-inclusion: non_null

  cache:
    type: caffeine
    cache-names:
      - idempotency
    caffeine:
      spec: "maximumSize=10000,expireAfterWrite=24h"

  liquibase:
    enabled: false

server:
  port: ${SERVER_PORT:8084}
  servlet:
    context-path: /api
  error:
    include-message: always
    include-binding-errors: always

services:
  engine:
    url: ${ENGINE_SERVICE_URL:http://localhost:8081}
  admin:
    url: ${ADMIN_SERVICE_URL:http://localhost:8083}

management:
  endpoints:
    web:
      exposure:
        include: health,info,metrics,prometheus
  endpoint:
    health:
      show-details: when-authorized
  metrics:
    export:
      prometheus:
        enabled: true

springdoc:
  api-docs:
    path: /api-docs
  swagger-ui:
    path: /swagger-ui.html
    enabled: true
    operations-sorter: method
    tags-sorter: alpha
    oauth2-redirect-url: http://localhost:8084/swagger-ui/oauth2-redirect.html
  show-actuator: true

logging:
  level:
    com.werkflow.business: ${LOG_LEVEL:INFO}
    org.springframework.security: ${SECURITY_LOG_LEVEL:INFO}
    org.hibernate.SQL: ${SQL_LOG_LEVEL:WARN}
    org.flywaydb: INFO
  pattern:
    console: "%d{yyyy-MM-dd HH:mm:ss} - %msg%n"
    file: "%d{yyyy-MM-dd HH:mm:ss} [%thread] %-5level %logger{36} - %msg%n"

keycloak:
  realm: ${KEYCLOAK_REALM:werkflow}
  auth-server-url: ${KEYCLOAK_URL:http://localhost:8090}
  resource: werkflow-api
  use-resource-role-mappings: true
  bearer-only: true
